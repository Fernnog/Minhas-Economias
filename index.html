<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Economias - Painel de Controle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Painel Financeiro</h1>
        <div class="header-actions">
            <div id="header-date"></div>
            <div class="auth-container">
                <button id="btn-login-toggle" class="icon-btn-small" title="Acessar Conta">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
                <div id="login-panel" class="hidden popover-panel">
                    <form id="login-form">
                        <input type="email" id="auth-email" placeholder="E-mail" required>
                        <input type="password" id="auth-password" placeholder="Senha" required>
                        <p id="auth-feedback" style="font-size: 0.85rem; margin-top: 5px; margin-bottom: 10px; text-align: center; display: none; font-weight: 600;"></p>
                        <button type="submit" class="btn-block">Entrar</button>
                    </form>
                    
                    <div id="logged-in-view" class="hidden" style="text-align: center;">
                        <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.2rem;">Conectado como:</p>
                        <p id="user-email-display" style="margin-bottom: 1rem; font-weight: 600; color: var(--text);"></p>
                        <button id="btn-logout" class="btn-block" style="background-color: var(--danger);">Sair da Conta</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="app-container">
        
        <div id="dashboard-view">
            <div class="dashboard-header">
                <div class="card summary-card" id="card-saldo-atual">
                    <p>Saldo Atual</p>
                    <h2 id="saldo-atual-display">R$ 0,00</h2>
                </div>
                <div class="card summary-card" id="card-saldo-mes">
                    <p>Projeção Final do Mês</p>
                    <h2 id="saldo-fim-mes-display">R$ 0,00</h2>
                </div>
                
                <div class="action-menu">
                    <button id="btn-novo-lancamento" class="icon-btn" title="Novo Lançamento" onclick="showView('form')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <button id="btn-ver-movimentos" class="icon-btn" title="Gerenciar Movimentações" onclick="showView('extract')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    </button>
                    <button id="btn-orcamento" class="icon-btn" title="Configurar Orçamentos" onclick="showView('budget')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </button>
                </div>
            </div>

            <section class="dashboard-body">
                <div class="card chart-card">
                    <h3>Despesas por Categoria (Este Mês)</h3>
                    <div id="category-chart" class="simple-bar-chart"></div>
                </div>
            </section>
        </div>

        <div id="management-view" class="hidden">
            <div class="nav-bar">
                <button class="btn-voltar" onclick="showDashboard()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Voltar ao Dashboard
                </button>
            </div>
            
            <div class="grid-layout">
                <aside id="view-form" class="hidden">
                    <div class="card">
                        <h3>Lançamento</h3>
                        <form id="transaction-form">
                            <input type="hidden" id="trans-id">
                            <label>Tipo</label>
                            <select id="trans-type" required>
                                <option value="despesa">Despesa</option>
                                <option value="receita">Receita</option>
                            </select>
                            <label>Valor (R$)</label>
                            <input type="text" id="trans-amount" inputmode="numeric" placeholder="0,00" required>
                            <label>Categoria</label>
                            <select id="trans-category" required></select>
                            <label>Data</label>
                            <input type="date" id="trans-date" required>
                            <label>Descrição</label>
                            <input type="text" id="trans-desc" required>
                            
                            <label>Tipo de Repetição</label>
                            <select id="trans-recurrence-type">
                                <option value="unica">Única</option>
                                <option value="recorrente">Recorrente (Fixa Indefinida)</option>
                                <option value="parcelada">Compra Parcelada</option>
                            </select>
                            
                            <div id="parcelas-container" class="hidden" style="margin-top: 0.5rem; margin-bottom: 1rem;">
                                <label>Número de Parcelas</label>
                                <input type="number" id="trans-installments" min="2" max="72" value="2">
                            </div>
                            
                            <button type="submit" id="btn-save">Salvar Lançamento</button>
                        </form>
                    </div>

                    <div class="card">
                        <h3>Nova Categoria</h3>
                        <form id="category-form">
                            <input type="text" id="new-category" placeholder="Nome da categoria..." required>
                            <button type="submit">Adicionar</button>
                        </form>
                    </div>
                </aside>

                <section id="view-extract" class="hidden">
                    <div class="card">
                        <div class="month-selector-header">
                            <h3 id="extract-month-title">Extrato de Lançamentos</h3>
                            <button class="icon-btn-small" title="Selecionar Mês">
                                <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <input type="month" id="extract-month-picker" class="hidden-date-picker">
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table id="extract-table">
                                <tbody id="transaction-list"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="view-budget" class="hidden">
                    <div class="month-selector-header">
                        <h3 id="budget-month-title">Orçamento Mensal</h3>
                        <button class="icon-btn-small" title="Selecionar Mês">
                            <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <input type="month" id="budget-month-picker" class="hidden-date-picker">
                        </button>
                    </div>

                    <details class="card collapsible-card">
                        <summary>
                            <span>Configurar Novo Orçamento</span>
                            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="collapsible-content">
                            <form id="budget-form">
                                <input type="hidden" id="budget-id">
                                <label>Categoria</label>
                                <select id="budget-category" required></select>
                                <label>Meta de Gasto (R$)</label>
                                <input type="number" id="budget-amount" step="0.01" placeholder="0,00" required>
                                <label>Recorrência</label>
                                <select id="budget-recurrence" required>
                                    <option value="mensal">Todos os meses (Recorrente)</option>
                                    <option value="unico">Apenas neste mês selecionado</option>
                                </select>
                                <button type="submit" id="btn-save-budget">Definir Orçamento</button>
                            </form>
                        </div>
                    </details>

                    <div class="card">
                        <h3 style="text-align: center;">Orçamentos</h3>
                        <div id="budget-current-month" class="card month-card" style="text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--primary); margin-bottom: 1.5rem; padding: 1rem;">
                            Carregando mês...
                        </div>
                        <div id="budget-container"></div>
                    </div>
                </section>
            </div>
        </div>

    </main>

    <dialog id="changelog-modal">
        <div class="dialog-header">
            <h3>Histórico de Evolução</h3>
            <button class="close-dialog" onclick="document.getElementById('changelog-modal').close()">&times;</button>
        </div>
        <div id="changelog-content"></div>
    </dialog>

    <div id="version-card" class="version-badge" title="Clique para ver o histórico de alterações">
        v<span id="app-version"></span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-service.js"></script>
    <script src="changelog.js"></script>
    <script src="budget.js"></script>
    <script src="extract.js"></script>
    <script src="script.js"></script>
</body>
</html>
